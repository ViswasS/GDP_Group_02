<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EdgeCare - AI Console</title>

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/utilities.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/toast.css" />
  <style>
    .iframe-wrap { border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; background:var(--surface-2); height:70vh; }
    .iframe-wrap iframe { width:100%; height:100%; border:0; background:#fff; }
  </style>
</head>
<body class="page">
  <div class="topbar">
    <div class="topbar-left">
      <a class="brand-lockup brand-lockup--link" href="/admin/dashboard.html" aria-label="EdgeCare admin dashboard">
        <img src="/assets/logo.png" alt="EdgeCare logo" class="brand-logo" />
        <span class="brand-text">
          <span class="brand">EdgeCare</span>
          <span class="brand-subtitle">Admin Intelligence</span>
        </span>
      </a>
      <div class="pill">AI Console</div>
    </div>
    <div class="topbar-right">
      <div class="nav-links">
        <a class="nav-link" href="/admin/dashboard.html">Dashboard</a>
        <a class="nav-link" href="/admin/insights.html">Case Queue</a>
        <a class="nav-link nav-link--active" href="/admin/ai-console.html">AI Console</a>
      </div>
      <span id="meLabel" class="user-chip muted"></span>
      <button id="logoutBtn" class="btn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">AI Console</div>
          <div class="card-subtitle">Embedded AI triage workspace for monitored demos and review.</div>
        </div>
        <a class="btn" href="https://edge-care.onrender.com/" target="_blank" rel="noreferrer noopener">Open in new tab</a>
      </div>
      <div class="iframe-wrap">
        <iframe id="aiFrame" src="https://edge-care.onrender.com/" title="EdgeCare AI Console"></iframe>
      </div>
      <div id="iframeFallback" class="muted" style="display:none; margin-top:8px;">
        Unable to load the embedded console. Try <a class="link" href="https://edge-care.onrender.com/" target="_blank" rel="noreferrer noopener">opening it directly</a>.
      </div>
    </div>
  </div>

  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/ai-console.js"></script>
</body>
</html>
