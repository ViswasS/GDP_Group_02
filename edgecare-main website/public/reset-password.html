<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EdgeCare | Reset Password</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1>Reset your password</h1>
    <p class="muted">Use the link from your email to set a new password.</p>

    <div id="statusBox" class="banner hidden"></div>

    <div id="actions" class="hidden" style="margin-bottom:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn secondary" href="/forgot-password.html">Request new link</a>
      <a class="btn primary hidden" id="goLoginBtn" href="/doctor-login.html">Go to login</a>
    </div>

    <form id="resetForm" class="form-stack hidden" novalidate>
      <label for="newPassword">New password</label>
      <div class="password-field">
        <input id="newPassword" type="password" minlength="8" autocomplete="new-password" required />
        <button type="button" class="toggle" data-target="newPassword">Show</button>
      </div>

      <label for="confirmPassword">Confirm password</label>
      <div class="password-field">
        <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
        <button type="button" class="toggle" data-target="confirmPassword">Show</button>
      </div>

      <button id="submitBtn" type="submit" class="btn primary">Reset password</button>
    </form>
  </main>

  <script type="module" src="/js/auth/reset-password.js"></script>
</body>
</html>
