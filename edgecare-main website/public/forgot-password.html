<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EdgeCare | Forgot Password</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1>Forgot your password?</h1>
    <p class="muted">Enter your email. If an account exists, we'll send a reset link.</p>

    <div id="statusBox" class="banner hidden"></div>

    <form id="forgotForm" class="form-stack" novalidate>
      <label for="email">Email address</label>
      <input id="email" type="email" name="email" autocomplete="email" required placeholder="you@example.com" />
      <button id="submitBtn" type="submit" class="btn primary">Send reset link</button>
    </form>

    <p class="muted" style="margin-top:16px;">
      <a class="link" href="/doctor-login.html">Back to login</a>
    </p>
  </main>

  <script type="module" src="/js/auth/forgot-password.js"></script>
</body>
</html>
