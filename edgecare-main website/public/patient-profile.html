<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EdgeCare - Patient Profile</title>
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/utilities.css" />
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/toast.css" />
</head>
<body class="page">
  <div class="topbar">
    <div class="topbar-left">
      <a class="brand-lockup brand-lockup--link" href="/patient-dashboard.html" aria-label="EdgeCare patient dashboard">
        <img src="/assets/logo.png" alt="EdgeCare logo" class="brand-logo" />
        <span class="brand-text">
          <span class="brand">EdgeCare</span>
          <span class="brand-subtitle">Care Intelligence</span>
        </span>
      </a>
      <div class="pill">Patient Portal</div>
    </div>
    <div class="topbar-right">
      <div class="nav-links">
        <a class="nav-link" href="/patient-dashboard.html">Dashboard</a>
        <a class="nav-link" href="/patient-cases.html">Cases</a>
        <a class="nav-link nav-link--active" href="/patient-profile.html">Profile</a>
      </div>
      <span id="meLabel" class="user-chip muted"></span>
      <button id="logoutBtn" class="btn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card card--hero" style="margin-bottom: var(--s-4);">
      <div class="card-header">
        <div>
          <div class="eyebrow">Patient Profile</div>
          <div class="card-title">My Profile</div>
          <div class="card-subtitle">View and update your account details</div>
        </div>
        <button id="editBtn" class="btn small" aria-label="Edit profile">Edit</button>
      </div>

      <div id="profileStatus" class="muted">Loading profile...</div>

      <div id="profileForm" class="stack" style="display:none;">
        <div class="profile-tabbar" role="tablist" aria-label="Profile sections">
          <button id="overviewTabBtn" class="profile-tab profile-tab--active" type="button" role="tab" aria-selected="true" data-profile-tab="overview">Overview</button>
          <button id="medicalInfoTabBtn" class="profile-tab" type="button" role="tab" aria-selected="false" data-profile-tab="medical-info">Medical History</button>
        </div>

        <section id="profileOverviewSection" class="profile-section profile-section--active" data-profile-section="overview">
          <div class="form-grid">
            <div class="field">
              <label class="label" for="firstName">First Name</label>
              <input id="firstName" class="input" type="text" />
            </div>
            <div class="field">
              <label class="label" for="lastName">Last Name</label>
              <input id="lastName" class="input" type="text" />
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label class="label" for="dob">Date of Birth</label>
              <input id="dob" class="input" type="date" />
            </div>
            <div class="field">
              <label class="label" for="gender">Gender</label>
              <select id="gender" class="input">
                <option value="">Select</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label class="label" for="language">Preferred Language</label>
              <input id="language" class="input" type="text" placeholder="en" />
            </div>
            <div class="field" style="display:flex; align-items:center; gap:10px; margin-top: 22px;">
              <input id="consentStatus" type="checkbox" style="width:auto; height:auto;" />
              <label for="consentStatus" class="label" style="margin:0;">Consent given</label>
            </div>
          </div>

          <div class="field">
            <label class="label">Email</label>
            <input id="email" class="input" type="email" disabled />
            <div class="help">Email is read-only</div>
          </div>
        </section>

        <section id="profileMedicalInfoSection" class="profile-section" data-profile-section="medical-info">
          <div class="field">
            <label class="label" for="allergies">Allergies</label>
            <textarea id="allergies" class="input" rows="5" placeholder="Add food, medication, environmental, or other allergies if relevant."></textarea>
            <div class="help">Leave blank if there are no known allergies to record.</div>
          </div>

          <div class="field">
            <label class="label" for="knownMedicalConditions">Known Medical Conditions</label>
            <textarea id="knownMedicalConditions" class="input" rows="6" placeholder="Add chronic conditions, current diagnoses, or notable medical history."></textarea>
            <div class="help">This will be visible to assigned doctors as read-only patient context.</div>
          </div>
        </section>

        <div class="row" style="justify-content:flex-end; gap:12px; margin-top: var(--s-4);" id="actionRow">
          <button id="cancelBtn" class="btn">Cancel</button>
          <button id="saveBtn" class="btn primary">Save Changes</button>
        </div>
      </div>

      <div id="out" class="pre"></div>
    </div>
  </div>

  <script src="/js/doctor/toast.js"></script>
  <script src="/js/doctor/api.js"></script>
  <script src="/js/patient/profile.js"></script>
</body>
</html>
