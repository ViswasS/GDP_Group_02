<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EdgeCare - Portal Login</title>
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/utilities.css" />
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/toast.css" />
</head>
<body data-default-role="DOCTOR">
  <div class="topbar">
    <div class="topbar-left">
      <a class="brand-lockup brand-lockup--link" href="/doctor-login.html" aria-label="EdgeCare login">
        <img src="/assets/logo.png" alt="EdgeCare logo" class="brand-logo" />
        <span class="brand-text">
          <span class="brand">EdgeCare</span>
          <span class="brand-subtitle">Care Intelligence</span>
        </span>
      </a>
      <div class="pill">Doctor / Patient Portal</div>
    </div>
    <div class="topbar-right">
      <a class="link" href="/doctor-register.html">Create Account</a>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card card--hero" style="max-width:520px; margin: 0 auto;">
        <div class="eyebrow">Secure Access</div>
        <h1 class="title">Sign in</h1>
        <p class="muted">Choose your role and enter your credentials.</p>

        <div id="formError" class="muted" style="display:none; color: var(--danger); font-weight:600;"></div>
        <div class="form">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />

          <label>Password</label>
          <input id="password" type="password" placeholder="********" autocomplete="current-password" />

          <label>Role</label>
          <select id="role" class="input">
            <option value="">Select role</option>
            <option value="DOCTOR">Doctor</option>
            <option value="PATIENT">Patient</option>
          </select>

          <button id="loginBtn" class="btn primary">Login</button>

          <div class="row" style="gap:8px;">
            <a class="link" href="/doctor-register.html">Create account</a>
            <a class="link" style="margin-left:auto;" href="/forgot-password.html">Forgot password?</a>
          </div>

          <pre id="out" class="pre"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/doctor/toast.js"></script>
  <script src="/js/doctor/api.js"></script>
  <script src="/js/auth/login.js"></script>
</body>
</html>
